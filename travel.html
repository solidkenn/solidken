<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Log — solidkenn.exe</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/globe.gl"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: #7a7a85;
    --accent: #f5d000;
    --accent2: #ffb800;
    --font-display: 'Rajdhani', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
  }

  /* ── HEADER ── */
  .travel-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 2rem;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, transparent 100%);
  }

  .travel-back {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .travel-back:hover { color: var(--accent); }
  .travel-back svg { width: 14px; height: 14px; }

  .travel-title-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  .travel-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .travel-title {
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .travel-badge {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    background: rgba(245,208,0,0.1);
    color: var(--accent);
    border: 1px solid rgba(245,208,0,0.25);
    border-radius: 20px;
    padding: 0.3rem 0.85rem;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  /* ── HINT BAR ── */
  .travel-hint {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    line-height: 1.45;
    color: var(--muted);
    background: rgba(10,10,10,0.7);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.45rem 1.15rem;
    pointer-events: none;
    max-width: min(420px, calc(100vw - 2rem));
    text-align: center;
    white-space: normal;
  }

  /* ── CITY POPUP ── */
  .city-popup {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 11;
    width: min(320px, calc(100vw - 2.5rem));
    max-height: min(85vh, 560px);
    overflow-y: auto;
    padding: 1rem 1.1rem 1rem 1.15rem;
    background: rgba(17,17,17,0.94);
    border: 1px solid rgba(245,208,0,0.35);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    pointer-events: auto;
  }

  .city-popup--dock-right {
    right: 1.25rem;
    left: auto;
  }

  .city-popup--dock-left {
    left: 1.25rem;
    right: auto;
  }

  @media (max-width: 520px) {
    .city-popup {
      top: auto;
      bottom: 5.75rem;
      right: 0.75rem;
      left: 0.75rem;
      width: auto;
      max-height: min(42vh, 360px);
      transform: none;
    }
    .city-popup--dock-left,
    .city-popup--dock-right {
      left: 0.75rem;
      right: 0.75rem;
    }
  }
  .city-popup[hidden] { display: none !important; }

  .city-popup-close {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    width: 1.75rem;
    height: 1.75rem;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    font-size: 1.35rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .city-popup-close:hover {
    color: var(--accent);
    background: rgba(245,208,0,0.08);
  }

  .city-popup-country {
    font-family: var(--font-display);
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--accent);
    padding-right: 1.75rem;
    margin-bottom: 0.35rem;
  }

  .city-popup-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .city-popup-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .city-popup-list li {
    font-family: var(--font-body);
    font-size: 0.9rem;
    color: var(--text);
    padding: 0.25rem 0;
    padding-left: 0.85rem;
    border-left: 2px solid rgba(245,208,0,0.35);
    margin-bottom: 0.2rem;
  }
  .city-popup-list li:last-child { margin-bottom: 0; }

  .city-popup-note {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.4;
    margin: 0;
  }

  /* ── Connector line (globe → popup) ── */
  .city-popup-connector {
    position: fixed;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 9;
    display: none;
  }
  .city-popup-connector line {
    stroke: rgba(245,208,0,0.55);
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-dasharray: 5 4;
  }
  .city-popup-connector circle {
    fill: rgba(245,208,0,0.85);
    stroke: rgba(10,10,10,0.9);
    stroke-width: 1.5;
  }

  /* ── GLOBE ── */
  #globe-container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  /* ── LOADING OVERLAY ── */
  #globe-loading {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: var(--bg);
    transition: opacity 0.5s ease;
  }
  #globe-loading.hidden { opacity: 0; pointer-events: none; }

  .loading-dot-row { display: flex; gap: 0.5rem; }
  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot-pulse 1.2s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .loading-text {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .loader-bar-wrap {
    width: 220px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f5d000, #ffb800);
    border-radius: 2px;
    transition: width 0.15s ease;
    box-shadow: 0 0 8px rgba(245,208,0,0.6);
  }
  .loader-percent {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="globe-loading">
  <div class="loading-dot-row">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
  <p class="loading-text" id="loading-text">Loading map...</p>
  <div class="loader-bar-wrap">
    <div class="loader-bar" id="loader-bar"></div>
  </div>
  <p class="loader-percent" id="loader-percent">0%</p>
</div>

<header class="travel-header">
  <a href="index.html" class="travel-back">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    back
  </a>
  <div class="travel-title-group">
    <span class="travel-label">// travel log</span>
    <span class="travel-title">Where I've been</span>
  </div>
  <span class="travel-badge">9 countries visited</span>
</header>

<div id="globe-container"></div>

<svg id="city-popup-connector" class="city-popup-connector" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <line id="city-popup-connector-line" x1="0" y1="0" x2="0" y2="0" />
  <circle id="city-popup-connector-dot" r="5" cx="0" cy="0" />
</svg>

<div id="city-popup" class="city-popup" hidden>
  <button type="button" class="city-popup-close" id="city-popup-close" aria-label="Close">×</button>
  <h4 class="city-popup-country" id="city-popup-country"></h4>
  <p class="city-popup-note" id="city-popup-note" hidden></p>
  <p class="city-popup-label" id="city-popup-label">Cities visited</p>
  <ul class="city-popup-list" id="city-popup-list"></ul>
</div>

<p class="travel-hint">Click &amp; drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Tap a <span style="color:var(--accent)">highlighted</span> country (when still) for cities</p>

<script>
  const VISITED = ['SG','HK','MY','KR','GB','AU','CA','AE','PH'];
  const CITIES_BY_COUNTRY = {
    SG: ['Singapore'],
    HK: ['Hong Kong'],
    MY: ['Kuala Lumpur', 'Johor Bahru'],
    KR: ['Seoul'],
    GB: ['Cambridge', 'Oxford', 'London', 'Liverpool', 'Edinburgh', 'Salisbury'],
    AU: ['Brisbane', 'Sydney'],
    CA: ['Calgary', 'Surrey', 'Banff', 'Toronto', 'Vancouver'],
    AE: ['Abu Dhabi'],
    PH: ['Manila', 'Palawan', 'La Union', 'Bataan', 'Zambales'],
  };

  const loading   = document.getElementById('globe-loading');
  const container = document.getElementById('globe-container');

  const loaderBar     = document.getElementById('loader-bar');
  const loaderPercent = document.getElementById('loader-percent');
  const loadingText   = document.getElementById('loading-text');

  const cityPopup       = document.getElementById('city-popup');
  const cityPopupClose  = document.getElementById('city-popup-close');
  const cityPopupCountry = document.getElementById('city-popup-country');
  const cityPopupNote   = document.getElementById('city-popup-note');
  const cityPopupLabel  = document.getElementById('city-popup-label');
  const cityPopupList   = document.getElementById('city-popup-list');
  const connectorSvg    = document.getElementById('city-popup-connector');
  const connectorLine   = document.getElementById('city-popup-connector-line');
  const connectorDot    = document.getElementById('city-popup-connector-dot');

  let globeRef = null;
  let connectorGeo = null;
  let connectorRaf = null;

  function featureCentroidGeo(feat) {
    const g = feat.geometry;
    if (!g) return { lat: 0, lng: 0, altitude: 0.005 };
    function ringAvg(ring) {
      let sx = 0, sy = 0;
      const n = ring.length;
      for (let i = 0; i < n; i++) { sx += ring[i][0]; sy += ring[i][1]; }
      return [sx / n, sy / n];
    }
    if (g.type === 'Polygon') {
      const [lng, lat] = ringAvg(g.coordinates[0]);
      return { lat, lng, altitude: 0.005 };
    }
    if (g.type === 'MultiPolygon') {
      let best = null;
      let bestA = -1;
      for (const poly of g.coordinates) {
        const ring = poly[0];
        let a = 0;
        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          a += ring[j][0] * ring[i][1] - ring[i][0] * ring[j][1];
        }
        if (Math.abs(a) > bestA) { bestA = Math.abs(a); best = ringAvg(ring); }
      }
      if (!best) return { lat: 0, lng: 0, altitude: 0.005 };
      const [lng, lat] = best;
      return { lat, lng, altitude: 0.005 };
    }
    return { lat: 0, lng: 0, altitude: 0.005 };
  }

  function hideCityPopup() {
    if (connectorRaf != null) {
      cancelAnimationFrame(connectorRaf);
      connectorRaf = null;
    }
    connectorGeo = null;
    cityPopup.hidden = true;
    cityPopup.classList.remove('city-popup--dock-left', 'city-popup--dock-right');
    cityPopupList.innerHTML = '';
    cityPopupNote.hidden = true;
    cityPopupNote.textContent = '';
    cityPopupLabel.hidden = false;
    if (connectorSvg) connectorSvg.style.display = 'none';
  }

  function isNarrowTravelView() {
    return window.matchMedia('(max-width: 520px)').matches;
  }

  /** Pick left vs right dock so the connector path is shorter (desktop only). */
  function applyCityPopupDockSide() {
    cityPopup.classList.remove('city-popup--dock-left', 'city-popup--dock-right');
    if (!globeRef || !connectorGeo) {
      cityPopup.classList.add('city-popup--dock-right');
      return;
    }
    if (isNarrowTravelView()) {
      return;
    }

    const alt = connectorGeo.altitude != null ? connectorGeo.altitude : 0.005;
    const p = globeRef.getScreenCoords(connectorGeo.lat, connectorGeo.lng, alt);
    const rect = globeRef.renderer().domElement.getBoundingClientRect();
    if (!p || !isFinite(p.x) || !isFinite(p.y)) {
      cityPopup.classList.add('city-popup--dock-right');
      return;
    }

    const x1 = rect.left + p.x;
    const y1 = rect.top + p.y;
    const w = window.innerWidth;
    const h = window.innerHeight;
    const margin = 20;
    const popupW = Math.min(320, w - 40);
    const yMid = h * 0.5;
    const xAttachRight = w - margin - popupW;
    const xAttachLeft = margin + popupW;
    const distR = Math.hypot(x1 - xAttachRight, y1 - yMid);
    const distL = Math.hypot(x1 - xAttachLeft, y1 - yMid);
    cityPopup.classList.add(distL < distR ? 'city-popup--dock-left' : 'city-popup--dock-right');
  }

  function showCityPopupForFeature(feat, clickCoords) {
    const iso = feat.properties.ISO_A2;
    const name = feat.properties.NAME || feat.properties.ADMIN || 'Country';
    const visited = VISITED.includes(iso);
    const cities = CITIES_BY_COUNTRY[iso];

    cityPopupCountry.textContent = name;
    cityPopupList.innerHTML = '';

    connectorGeo = clickCoords != null && typeof clickCoords.lat === 'number'
      ? { lat: +clickCoords.lat, lng: +clickCoords.lng, altitude: clickCoords.altitude != null ? +clickCoords.altitude : 0.005 }
      : featureCentroidGeo(feat);

    if (!visited) {
      cityPopupLabel.hidden = true;
      cityPopupNote.hidden = false;
      cityPopupNote.textContent = 'Not in your travel log yet.';
      cityPopup.hidden = false;
    } else {
      cityPopupNote.hidden = true;
      cityPopupLabel.hidden = false;
      cityPopupLabel.textContent = 'Cities visited';

      if (cities && cities.length) {
        cities.forEach(c => {
          const li = document.createElement('li');
          li.textContent = c;
          cityPopupList.appendChild(li);
        });
      } else {
        cityPopupLabel.hidden = true;
        cityPopupNote.hidden = false;
        cityPopupNote.textContent = 'Cities to be listed.';
      }
      cityPopup.hidden = false;
    }

    applyCityPopupDockSide();

    if (connectorRaf != null) cancelAnimationFrame(connectorRaf);
    connectorRaf = null;
    if (globeRef && connectorSvg && connectorLine && connectorDot) {
      connectorSvg.style.display = 'block';
      const tick = () => {
        if (!globeRef || !connectorGeo || cityPopup.hidden) {
          connectorRaf = null;
          return;
        }
        const w = window.innerWidth;
        const h = window.innerHeight;
        connectorSvg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        connectorSvg.setAttribute('width', String(w));
        connectorSvg.setAttribute('height', String(h));

        const alt = connectorGeo.altitude != null ? connectorGeo.altitude : 0.005;
        const p = globeRef.getScreenCoords(connectorGeo.lat, connectorGeo.lng, alt);
        const rect = globeRef.renderer().domElement.getBoundingClientRect();
        const pr = cityPopup.getBoundingClientRect();
        let x2;
        let y2;
        if (isNarrowTravelView()) {
          x2 = pr.left + pr.width / 2;
          y2 = pr.top;
        } else if (cityPopup.classList.contains('city-popup--dock-left')) {
          x2 = pr.right;
          y2 = pr.top + pr.height / 2;
        } else {
          x2 = pr.left;
          y2 = pr.top + pr.height / 2;
        }

        if (!p || !isFinite(p.x) || !isFinite(p.y)) {
          connectorLine.setAttribute('opacity', '0');
          connectorDot.setAttribute('opacity', '0');
        } else {
          const x1 = rect.left + p.x;
          const y1 = rect.top + p.y;
          connectorLine.setAttribute('opacity', '1');
          connectorDot.setAttribute('opacity', '1');
          connectorLine.setAttribute('x1', String(x1));
          connectorLine.setAttribute('y1', String(y1));
          connectorLine.setAttribute('x2', String(x2));
          connectorLine.setAttribute('y2', String(y2));
          connectorDot.setAttribute('cx', String(x1));
          connectorDot.setAttribute('cy', String(y1));
        }
        connectorRaf = requestAnimationFrame(tick);
      };
      connectorRaf = requestAnimationFrame(tick);
    }
  }

  cityPopupClose.addEventListener('click', hideCityPopup);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !cityPopup.hidden) hideCityPopup();
  });

  function setProgress(pct) {
    loaderBar.style.width = pct + '%';
    loaderPercent.textContent = Math.round(pct) + '%';
    if (pct >= 100) loadingText.textContent = 'Building globe...';
  }

  fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson')
    .then(res => {
      const total = +res.headers.get('Content-Length');
      const reader = res.body.getReader();
      const chunks = [];
      let loaded = 0;

      function pump() {
        return reader.read().then(({ done, value }) => {
          if (done) return;
          chunks.push(value);
          loaded += value.length;
          const pct = total ? (loaded / total) * 100 : 0;
          setProgress(Math.min(pct, 99));
          return pump();
        });
      }

      return pump().then(() => {
        setProgress(100);
        const blob = new Blob(chunks);
        return blob.text();
      }).then(text => JSON.parse(text));
    })
    .then(world => {
      let idleTimer;

      const globe = Globe()
        .width(window.innerWidth)
        .height(window.innerHeight)
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
        .backgroundImageUrl(null)
        .backgroundColor('#0a0a0a')
        .polygonsData(world.features)
        .polygonAltitude(0.005)
        .polygonCapColor(d => VISITED.includes(d.properties.ISO_A2) ? '#f5d000' : 'rgba(255,255,255,0.04)')
        .polygonSideColor(() => 'rgba(255,255,255,0.02)')
        .polygonStrokeColor(() => 'rgba(255,255,255,0.06)')
        .polygonLabel(d => VISITED.includes(d.properties.ISO_A2)
          ? `<div style="font-family:'DM Mono',monospace;font-size:0.75rem;background:#1a1a1a;border:1px solid rgba(245,208,0,0.4);color:#f5d000;padding:0.3rem 0.6rem;border-radius:4px;">${d.properties.NAME}</div>`
          : '')
        .onPolygonHover(hoverFeat => {
          if (hoverFeat && VISITED.includes(hoverFeat.properties.ISO_A2)) {
            globe.controls().autoRotate = false;
            clearTimeout(idleTimer);
          }
        })
        .onPolygonClick((feat, ev, coords) => {
          if (!feat) return;
          showCityPopupForFeature(feat, coords);
        })
        .pointOfView({ lat: 20, lng: 80, altitude: 2.5 })
        (container);

      globeRef = globe;
      globe.controls().autoRotate = true;
      globe.controls().autoRotateSpeed = 0.5;
      globe.controls().enableZoom = true;

      // Pause auto-rotate on drag, resume after 3s idle
      container.addEventListener('pointerdown', () => {
        globe.controls().autoRotate = false;
        clearTimeout(idleTimer);
      });
      container.addEventListener('pointerup', () => {
        idleTimer = setTimeout(() => { globe.controls().autoRotate = true; }, 3000);
      });

      window.addEventListener('resize', () => {
        globe.width(window.innerWidth).height(window.innerHeight);
        if (!cityPopup.hidden) applyCityPopupDockSide();
      });

      loading.classList.add('hidden');
    })
    .catch(() => {
      loading.innerHTML = '<p style="font-family:\'DM Mono\',monospace;font-size:0.8rem;color:#7a7a85;">Could not load map. Check your connection.</p>';
    });
</script>
</body>
</html>
